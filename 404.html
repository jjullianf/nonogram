<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Nonogram.ch</title>
<link rel="icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #1a1a1a; --ink2: #3a3a3a; --ink3: #6a6a6a;
  --paper:  #f8f6f1; --paper2: #edeae3; --paper3: #e0dcd3;
  --gold:   #c9a84c; --border: #c8c4bb; --r: 3px;
}
@media (prefers-color-scheme: dark) {
  :root { --ink: #f0ede6; --ink2: #c8c4bb; --ink3: #8a8880; --paper: #1a1916; --paper2: #222119; --paper3: #2c2b23; --border: #3a3830; }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Mono', monospace; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }

.error-grid {
  display: grid;
  grid-template-columns: repeat(5, 28px);
  grid-template-rows: repeat(5, 28px);
  gap: 3px;
  margin-bottom: 36px;
}
.cell { width: 28px; height: 28px; border-radius: 2px; background: var(--paper2); border: 1px solid var(--border); }
.cell.on { background: var(--ink); border-color: var(--ink); }

.code {
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--ink3); margin-bottom: 10px;
}
h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(20px, 4vw, 26px);
  font-weight: 400; letter-spacing: -.01em;
  margin-bottom: 10px;
}
p { font-size: 13px; color: var(--ink3); line-height: 1.7; margin-bottom: 28px; }

.links { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.btn {
  font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .07em;
  text-transform: uppercase; padding: 9px 20px;
  border: 1.5px solid var(--border); background: var(--paper2); color: var(--ink);
  border-radius: var(--r); text-decoration: none; transition: all .12s;
}
.btn:hover { background: var(--paper3); border-color: var(--ink3); }
.btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.btn.primary:hover { background: var(--ink2); }
</style>
</head>
<body>

<!-- A small 5×5 "?" pixel art using filled cells -->
<div class="error-grid" aria-hidden="true">
  <!-- Row 1: · ■ ■ ■ · -->
  <div class="cell"></div><div class="cell on"></div><div class="cell on"></div><div class="cell on"></div><div class="cell"></div>
  <!-- Row 2: · · · ■ · -->
  <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell on"></div><div class="cell"></div>
  <!-- Row 3: · · ■ ■ · -->
  <div class="cell"></div><div class="cell"></div><div class="cell on"></div><div class="cell on"></div><div class="cell"></div>
  <!-- Row 4: · · · · · -->
  <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  <!-- Row 5: · · ■ · · -->
  <div class="cell"></div><div class="cell"></div><div class="cell on"></div><div class="cell"></div><div class="cell"></div>
</div>

<div class="code">404</div>
<h1>Page not found</h1>
<p>This puzzle piece doesn't fit.<br>The page you're looking for doesn't exist.</p>

<div class="links">
  <a class="btn primary" href="index.html">Today's puzzle</a>
  <a class="btn" href="play.html">Play</a>
  <a class="btn" href="guide.html">Guide</a>
</div>

</body>
</html>
